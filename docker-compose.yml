services:
  db:
    image: postgres:15-alpine
    container_name: my_project_db
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-}
      POSTGRES_DB: ${DATABASE_NAME:-app_db}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
  backend:
    image: backend:latest
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD}@db:5432/${DATABASE_NAME:-app_db}
      STORAGE_DIR: ${STORAGE_DIR:-/app/storage}
      BIGMODEL_API_KEY: ${BIGMODEL_API_KEY:-}
      BIGMODEL_MODEL: ${BIGMODEL_MODEL:-glm-4.5-air}
    volumes:
      - ./storage:/app/storage
    expose:
      - "3000"

  frontend:
    image: frontend:latest
    depends_on:
      - backend
    ports:
      - "80:80"

networks:
  default:
    name: resume-app-network
