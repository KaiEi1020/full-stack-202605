services:
  backend:
    image: backend:latest
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      SQLITE_DATABASE_PATH: ${SQLITE_DATABASE_PATH:-/app/data/data.sqlite}
      STORAGE_DIR: ${STORAGE_DIR:-/app/storage}
      BIGMODEL_API_KEY: ${BIGMODEL_API_KEY:-}
      BIGMODEL_MODEL: ${BIGMODEL_MODEL:-glm-4.5-air}
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    expose:
      - "3000"

  frontend:
    image: frontend:latest
    depends_on:
      - backend
    ports:
      - "80:80"

networks:
  default:
    name: resume-app-network
